version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: emporio_postgres
    environment:
      POSTGRES_USER: emporio_user
      POSTGRES_PASSWORD: emporio_password
      POSTGRES_DB: emporio_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
